services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000
        VITE_WS_BASE_URL: ws://127.0.0.1:8000
    expose:
      - "5173"
    depends_on:
      - api

  api:
    build: .
    ports:
      - "8000:8000"
      - "6080:6080"
      - "5900:5900"
    environment:
      AGENT_MODE: anthropic
      ENVIRONMENT: docker
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/aiops
      MAX_CONCURRENT_SESSIONS: 5
      SESSION_TIMEOUT_SECONDS: 1800
      AGENT_RUN_TIMEOUT_SECONDS: 300
      RELAY_REQUEST_TIMEOUT_SECONDS: 90
      BASH_TOOL_TIMEOUT_SECONDS: 45
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-for-local-development}
      JWT_EXPIRES_SECONDS: ${JWT_EXPIRES_SECONDS:-86400}
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET:-change-me-for-local-development}
      VNC_BASE_URL: http://localhost:6080
      VNC_PATH: vnc.html
      WIDTH: 1024
      HEIGHT: 768
      DISPLAY_NUM: 1
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aiops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aiops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
